name: Load Acceptance

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Deployed PulseWS image tag to accept"
        required: true
        default: edge
      retention_days:
        description: "Diagnostic artifact retention (1-30 days)"
        required: false
        default: "14"

permissions:
  contents: read

concurrency:
  group: production-load-benchmark
  cancel-in-progress: false

jobs:
  accept:
    runs-on: ubuntu-latest
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
      PULSEWS_SMOKE_URL: ${{ secrets.PULSEWS_SMOKE_URL }}
      PULSEWS_APP_ID: ${{ secrets.PULSEWS_APP_ID }}
      PULSEWS_APP_KEY: ${{ secrets.PULSEWS_APP_KEY }}
      PULSEWS_APP_SECRET: ${{ secrets.PULSEWS_APP_SECRET }}
      PULSEWS_IMAGE: ghcr.io/ayenisholah/pulsews:${{ inputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs and secrets
        run: |
          case "${{ inputs.retention_days }}" in
            ''|*[!0-9]*) exit 1 ;;
          esac
          test "${{ inputs.retention_days }}" -ge 1
          test "${{ inputs.retention_days }}" -le 30
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          test -n "$VPS_KNOWN_HOSTS"
          test -n "$PULSEWS_SMOKE_URL"
          test -n "$PULSEWS_APP_ID"
          test -n "$PULSEWS_APP_KEY"
          test -n "$PULSEWS_APP_SECRET"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Upload harness and credentials
        run: |
          run_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "RUN_ID=$run_id" >> "$GITHUB_ENV"
          tar -czf "$RUNNER_TEMP/loadtest.tgz" loadtest .github/scripts/run-load-acceptance.sh
          umask 077
          env_file="$RUNNER_TEMP/pulsews-load.env"
          printf 'PULSEWS_URL=%s\nPULSEWS_APP_ID=%s\nPULSEWS_APP_KEY=%s\nPULSEWS_APP_SECRET=%s\n' \
            "$PULSEWS_SMOKE_URL" "$PULSEWS_APP_ID" "$PULSEWS_APP_KEY" "$PULSEWS_APP_SECRET" > "$env_file"
          scp -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$RUNNER_TEMP/loadtest.tgz" "$env_file" "$VPS_USER@$VPS_HOST:/tmp/"
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "mkdir -p /opt/pulsews/loadtest /opt/pulsews/load-results/$run_id && tar -xzf /tmp/loadtest.tgz -C /opt/pulsews && install -m 600 /tmp/pulsews-load.env /tmp/pulsews-load-$run_id.env"

      - name: Run fixed 500-connection acceptance
        id: acceptance
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "GITHUB_SHA='$GITHUB_SHA' bash /opt/pulsews/.github/scripts/run-load-acceptance.sh '/opt/pulsews/load-results/$RUN_ID' '/tmp/pulsews-load-$RUN_ID.env' '$PULSEWS_IMAGE'"

      - name: Download machine-readable evidence
        if: ${{ always() }}
        run: |
          mkdir -p load-results
          scp -r -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST:/opt/pulsews/load-results/$RUN_ID/." load-results/ || true

      - uses: actions/setup-node@v4
        if: ${{ always() }}
        with:
          node-version: 22
          cache: npm

      - name: Unconditional cleanup and final smoke
        if: ${{ always() }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "rm -f '/tmp/pulsews-load-$RUN_ID.env' /tmp/pulsews-load.env /tmp/loadtest.tgz && test \"\$(docker compose -f /opt/pulsews/deploy/docker-compose.yml ps --status running --services | wc -l)\" -eq \"\$(docker compose -f /opt/pulsews/deploy/docker-compose.yml config --services | wc -l)\""
          npm ci
          npm run smoke:cluster

      - name: Upload acceptance evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: load-acceptance-${{ github.run_id }}-${{ github.run_attempt }}
          path: load-results/
          if-no-files-found: warn
          retention-days: ${{ fromJSON(inputs.retention_days || '14') }}

      - name: Remove runner credential file
        if: ${{ always() }}
        run: rm -f "$RUNNER_TEMP/pulsews-load.env"
