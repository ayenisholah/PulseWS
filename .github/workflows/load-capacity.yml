name: Measured Capacity Benchmark

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Deployed PulseWS image tag to benchmark"
        required: true
        default: edge
      retention_days:
        description: "Evidence retention (1-30 days)"
        required: false
        default: "30"

permissions:
  contents: read

concurrency:
  group: production-load-benchmark
  cancel-in-progress: false

jobs:
  capacity:
    runs-on: ubuntu-latest
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
      PULSEWS_SMOKE_URL: ${{ secrets.PULSEWS_SMOKE_URL }}
      PULSEWS_APP_ID: ${{ secrets.PULSEWS_APP_ID }}
      PULSEWS_APP_KEY: ${{ secrets.PULSEWS_APP_KEY }}
      PULSEWS_APP_SECRET: ${{ secrets.PULSEWS_APP_SECRET }}
      PULSEWS_IMAGE: ghcr.io/ayenisholah/pulsews:${{ inputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate inputs and secrets
        run: |
          case "${{ inputs.retention_days }}" in ''|*[!0-9]*) exit 1 ;; esac
          test "${{ inputs.retention_days }}" -ge 1 && test "${{ inputs.retention_days }}" -le 30
          for value in "$VPS_HOST" "$VPS_USER" "$VPS_SSH_KEY" "$VPS_KNOWN_HOSTS" "$PULSEWS_SMOKE_URL" "$PULSEWS_APP_ID" "$PULSEWS_APP_KEY" "$PULSEWS_APP_SECRET"; do test -n "$value"; done
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
      - name: Upload capacity harness and credentials
        run: |
          run_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "RUN_ID=$run_id" >> "$GITHUB_ENV"
          tar -czf "$RUNNER_TEMP/load-capacity.tgz" loadtest .github/scripts/run-load-capacity.sh
          umask 077
          printf 'PULSEWS_URL=%s\nPULSEWS_APP_ID=%s\nPULSEWS_APP_KEY=%s\nPULSEWS_APP_SECRET=%s\n' "$PULSEWS_SMOKE_URL" "$PULSEWS_APP_ID" "$PULSEWS_APP_KEY" "$PULSEWS_APP_SECRET" > "$RUNNER_TEMP/pulsews-capacity.env"
          scp "$RUNNER_TEMP/load-capacity.tgz" "$RUNNER_TEMP/pulsews-capacity.env" "$VPS_USER@$VPS_HOST:/tmp/"
          ssh "$VPS_USER@$VPS_HOST" "mkdir -p /opt/pulsews/load-results/$run_id && tar -xzf /tmp/load-capacity.tgz -C /opt/pulsews && install -m 600 /tmp/pulsews-capacity.env /tmp/pulsews-capacity-$run_id.env"
      - name: Run automatic capacity tiers
        run: ssh "$VPS_USER@$VPS_HOST" "GITHUB_SHA='$GITHUB_SHA' bash /opt/pulsews/.github/scripts/run-load-capacity.sh '/opt/pulsews/load-results/$RUN_ID' '/tmp/pulsews-capacity-$RUN_ID.env' '$PULSEWS_IMAGE'"
      - name: Download and validate evidence
        if: ${{ always() }}
        run: |
          mkdir -p load-results
          scp -r "$VPS_USER@$VPS_HOST:/opt/pulsews/load-results/$RUN_ID/." load-results/ || true
          test -s load-results/result.json
      - uses: actions/setup-node@v4
        if: ${{ always() }}
        with:
          node-version: 22
          cache: npm
      - name: Unconditional cleanup and production smoke
        if: ${{ always() }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" "rm -f '/tmp/pulsews-capacity-$RUN_ID.env' /tmp/pulsews-capacity.env /tmp/load-capacity.tgz"
          npm ci
          npm run smoke:cluster
      - name: Upload capacity evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: load-capacity-${{ github.run_id }}-${{ github.run_attempt }}
          path: load-results/
          if-no-files-found: error
          retention-days: ${{ fromJSON(inputs.retention_days || '30') }}
      - name: Remove runner credential file
        if: ${{ always() }}
        run: rm -f "$RUNNER_TEMP/pulsews-capacity.env"
