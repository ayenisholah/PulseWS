name: pulsews

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pulsews-a:
    image: ${PULSEWS_IMAGE:-ghcr.io/ayenisholah/pulsews:edge}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      PULSEWS_CONFIG: /run/secrets/pulsews.config.json
      PULSEWS_NODE_ID: pulsews-a
      PULSEWS_CLUSTER_SIZE: "2"
    volumes:
      - ./pulsews.config.json:/run/secrets/pulsews.config.json:ro
    ports:
      - "127.0.0.1:${PULSEWS_NODE_A_PORT:-6002}:6001"
    depends_on:
      redis:
        condition: service_healthy

  pulsews-b:
    image: ${PULSEWS_IMAGE:-ghcr.io/ayenisholah/pulsews:edge}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      PULSEWS_CONFIG: /run/secrets/pulsews.config.json
      PULSEWS_NODE_ID: pulsews-b
      PULSEWS_CLUSTER_SIZE: "2"
    volumes:
      - ./pulsews.config.json:/run/secrets/pulsews.config.json:ro
    ports:
      - "127.0.0.1:${PULSEWS_NODE_B_PORT:-6003}:6001"
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *default-logging
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - "${PULSEWS_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      pulsews-a:
        condition: service_healthy
      pulsews-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    logging: *default-logging
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      pulsews-a:
        condition: service_healthy
      pulsews-b:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.1.0
    restart: unless-stopped
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
