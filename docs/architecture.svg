<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">PulseWS production architecture</title>
  <desc id="desc">Clients connect through host nginx and Compose nginx to two PulseWS nodes backed by Redis and observed by Prometheus and Grafana.</desc>
  <defs>
    <style>
      .box { fill: #111827; stroke: #38bdf8; stroke-width: 2; rx: 12; }
      .infra { fill: #172554; stroke: #818cf8; stroke-width: 2; rx: 12; }
      .text { fill: #f8fafc; font: 16px system-ui, sans-serif; text-anchor: middle; }
      .small { fill: #cbd5e1; font: 13px system-ui, sans-serif; text-anchor: middle; }
      .line { stroke: #38bdf8; stroke-width: 3; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="960" height="420" fill="#020617"/>
  <rect class="box" x="30" y="165" width="140" height="80"/><text class="text" x="100" y="198">Pusher clients</text><text class="small" x="100" y="222">WebSocket + REST</text>
  <rect class="box" x="220" y="165" width="160" height="80"/><text class="text" x="300" y="198">Host nginx</text><text class="small" x="300" y="222">Certbot TLS</text>
  <rect class="box" x="430" y="165" width="150" height="80"/><text class="text" x="505" y="198">Compose nginx</text><text class="small" x="505" y="222">least_conn</text>
  <rect class="box" x="650" y="70" width="150" height="70"/><text class="text" x="725" y="112">PulseWS A</text>
  <rect class="box" x="650" y="270" width="150" height="70"/><text class="text" x="725" y="312">PulseWS B</text>
  <rect class="infra" x="825" y="165" width="110" height="80"/><text class="text" x="880" y="198">Redis 7</text><text class="small" x="880" y="222">cluster state</text>
  <rect class="infra" x="600" y="365" width="160" height="45"/><text class="text" x="680" y="393">Prometheus</text>
  <rect class="infra" x="790" y="365" width="140" height="45"/><text class="text" x="860" y="393">Grafana</text>
  <path class="line" d="M170 205 H220"/><path class="line" d="M380 205 H430"/><path class="line" d="M580 190 L650 115"/><path class="line" d="M580 220 L650 305"/><path class="line" d="M800 105 L850 165"/><path class="line" d="M800 305 L850 245"/><path class="line" d="M725 140 L690 365"/><path class="line" d="M725 270 L700 365"/><path class="line" d="M760 387 H790"/>
</svg>
